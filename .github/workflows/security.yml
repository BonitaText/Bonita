name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 5 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: text-reader-app/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm audit --audit-level=high